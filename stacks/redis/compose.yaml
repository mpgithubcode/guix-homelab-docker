services:
  redis:
    image: redis:7
    container_name: redis
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    volumes:
      - ${STACKS_DIR}/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          memory: 6g
networks:
  backend:
    external: true
volumes:
  redis_data: null
